{% set name = "pysmi" %}
{% set version = "1.6.2" %}
{% set sha256 = "abed01673113886d10f0f336426859238fc13b5383c7e28e13dbcd5af0443ba1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation
  skip: true  # [py<39]

requirements:
  host:
    - python
    - pip
    - flit-core >=3.9.0
  run:
    - python
    - ply >=3.11
    - jinja2 >=3.1.3
    - requests >=2.26.0

test:
  imports:
    - pysmi
    - pysmi.borrower
    - pysmi.codegen
    - pysmi.lexer
    - pysmi.parser
    - pysmi.reader
    - pysmi.searcher
    - pysmi.writer
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://www.pysnmp.com/pysmi/
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE.rst
  summary: SNMP SMI/MIB Parser
  description: A pure-Python implementation of SNMP/SMI MIB parsing and conversion library.
  doc_url: https://docs.lextudio.com/pysmi/
  dev_url: https://github.com/lextudio/pysmi

extra:
  recipe-maintainers:
    - nehaljwani
